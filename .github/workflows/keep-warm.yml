name: Keep FELLITO Warm

on:
  schedule:
    - cron: '*/14 * * * *'   # every 14 minutes, 24/7
  workflow_dispatch:          # also allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping FELLITO health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://fellito-epic-ate-agent.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: FELLITO returned $STATUS"
            exit 1
          fi
          echo "FELLITO is warm and healthy."
